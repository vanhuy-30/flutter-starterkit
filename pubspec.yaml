name: flutter_starter_kit
description: "A starter kit Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # localization:
  easy_localization: ^3.0.7
  intl: ^0.19.0

  # fonts:
  google_fonts: ^6.2.1

  # loader:
  shimmer: ^3.0.0

  # image:
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16

  # navigation:
  go_router: ^14.6.0

  # animations:
  lottie: ^3.2.0

  # automatic text resizing
  auto_size_text: ^3.0.0

  # date time picker
  calendar_date_picker2: ^2.0.1
  # refer: flutter_datetime_picker_plus, syncfusion_flutter_datepicker

  # splash:
  flutter_native_splash: ^2.4.2

  # env
  flutter_dotenv: ^5.2.0

  # otp
  pinput: ^5.0.1

  # data
  freezed_annotation: ^2.4.1
  equatable: ^2.0.5

  # local storage:
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5

  # state management:
  flutter_riverpod: ^2.6.1

  # networking
  dio: ^5.5.0
  retrofit: ^4.4.0
  connectivity_plus: ^6.1.3
  json_annotation: ^4.9.0

  # firebase services
  firebase_core: ^3.13.0
  firebase_remote_config: ^5.4.0
  firebase_messaging: ^15.2.0
  firebase_analytics: ^11.0.0
  firebase_performance: ^0.10.0

  # performance monitoring
  device_info_plus: ^9.1.2
  package_info_plus: ^4.2.0

  # local notification
  flutter_local_notifications: ^18.0.0

  # logging & crash reporting
  logger: ^2.0.2
  # sentry_flutter: ^8.14.2

  # security
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  jwt_decoder: ^2.0.1
  local_auth: ^2.1.8

  # documentation
  markdown: ^7.3.0

  # deep linking
  app_links: ^6.4.0

  # background tasks
  workmanager: ^0.5.2

  # app update
  upgrader: ^11.3.1

  cupertino_icons: ^1.0.8

  # file handling
  permission_handler: ^11.4.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.3.3
  retrofit_generator: ^8.0.0
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.1
  freezed: ^2.4.1

  # Testing
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  integration_test:
    sdk: flutter
  coverage: ^1.11.1

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/animations/
    - assets/icons/
    - assets/images/
    - assets/env/
  generate: true

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/splash_logo.png
  branding: assets/images/branding.png
  branding_mode: bottom
  android: true
  ios: true
  web: false
  android_gravity: center
  ios_content_mode: center
  fullscreen: true
